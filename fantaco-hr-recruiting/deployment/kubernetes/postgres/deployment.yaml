apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql-hr-recruiting
  labels:
    app: postgresql-hr-recruiting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql-hr-recruiting
  template:
    metadata:
      labels:
        app: postgresql-hr-recruiting
    spec:
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel9/postgresql-15
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              protocol: TCP
              name: pg-hr-recruit
          env:
            - name: POSTGRESQL_USER
              value: hr
            - name: POSTGRESQL_PASSWORD
              value: hr
            - name: POSTGRESQL_ADMIN_PASSWORD
              value: postgres
            - name: POSTGRESQL_DATABASE
              value: fantaco_hr
          volumeMounts:
            - name: pg-hr-recruit-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pg-hr-recruit-data
          emptyDir: {}
