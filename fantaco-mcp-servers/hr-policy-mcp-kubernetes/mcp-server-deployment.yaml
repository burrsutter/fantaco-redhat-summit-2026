apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-hr-policy
  labels:
    app: mcp-hr-policy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-hr-policy
  template:
    metadata:
      labels:
        app: mcp-hr-policy
    spec:
      containers:
      - name: mcp-server
        image: docker.io/burrsutter/mcp-server-hr-policy:1.0.0
        imagePullPolicy: Always
        env:
        - name: HR_POLICY_SEARCH_API_BASE_URL
          value: http://fantaco-hr-policy-search-service:8091
        ports:
        - containerPort: 9007
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
