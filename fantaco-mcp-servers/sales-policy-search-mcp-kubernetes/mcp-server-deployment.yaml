apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-sales-policy-search
  labels:
    app: mcp-sales-policy-search
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-sales-policy-search
  template:
    metadata:
      labels:
        app: mcp-sales-policy-search
    spec:
      containers:
      - name: mcp-server
        image: docker.io/burrsutter/mcp-server-sales-policy-search:1.0.0
        imagePullPolicy: Always
        env:
        - name: SALES_POLICY_SEARCH_API_BASE_URL
          value: http://fantaco-sales-policy-search-service:8090
        ports:
        - containerPort: 9006
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
