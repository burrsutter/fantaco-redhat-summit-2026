apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-hr-recruiting
  labels:
    app: mcp-hr-recruiting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-hr-recruiting
  template:
    metadata:
      labels:
        app: mcp-hr-recruiting
    spec:
      containers:
      - name: mcp-server
        image: docker.io/burrsutter/mcp-server-hr-recruiting:1.0.0
        imagePullPolicy: Always
        env:
        - name: HR_API_BASE_URL
          value: http://fantaco-hr-recruiting-service:8085
        ports:
        - containerPort: 9005
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
