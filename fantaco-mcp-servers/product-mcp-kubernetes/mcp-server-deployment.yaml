apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-product
  labels:
    app: mcp-product
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-product
  template:
    metadata:
      labels:
        app: mcp-product
    spec:
      containers:
      - name: mcp-server
        image: docker.io/burrsutter/mcp-server-product:1.0.0
        imagePullPolicy: Always
        env:
        - name: PRODUCT_API_BASE_URL
          value: http://fantaco-product-service:8083
        ports:
        - containerPort: 9003
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
