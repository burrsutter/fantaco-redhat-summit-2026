version: 1
filesystem_policy:
  include_workdir: true
  read_only:
  - /usr
  - /lib
  - /proc
  - /dev/urandom
  - /app
  - /etc
  - /var/log
  read_write:
  - /sandbox
  - /tmp
  - /dev/null
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  claude_code:
    name: claude_code
    endpoints:
    - host: api.anthropic.com
      port: 443
      protocol: rest
      enforcement: enforce
      access: full
    - host: statsig.anthropic.com
      port: 443
    - host: sentry.io
      port: 443
    - host: raw.githubusercontent.com
      port: 443
    - host: platform.claude.com
      port: 443
    - host: api.openai.com
      port: 443
      protocol: rest
      enforcement: enforce
      access: full
    - host: litellm-prod.apps.maas.redhatworkshops.io
      port: 443
      protocol: rest
      enforcement: enforce
      access: full
    - host: api.telegram.org
      port: 443
      protocol: rest
      enforcement: enforce
      access: full
    - host: wttr.in
      port: 443
    - host: api.nasa.gov
      port: 443
    - host: apod.nasa.gov
      port: 443
    binaries:
    - path: /usr/local/bin/claude
    - path: /usr/bin/node
  github:
    name: github
    endpoints:
    - host: github.com
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**/info/refs*
      - allow:
          method: POST
          path: /**/git-upload-pack
    binaries:
    - path: /usr/bin/git
  github_rest_api:
    name: github-rest-api
    endpoints:
    - host: api.github.com
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: HEAD
          path: /**
      - allow:
          method: OPTIONS
          path: /**
    binaries:
    - path: /usr/local/bin/claude
    - path: /usr/bin/gh
  gitlab:
    name: gitlab
    endpoints:
    - host: gitlab.com
      port: 443
    - host: gitlab.mycorp.com
      port: 443
    binaries:
    - path: /usr/bin/glab
  nvidia:
    name: nvidia
    endpoints:
    - host: integrate.api.nvidia.com
      port: 443
    binaries:
    - path: /usr/bin/curl
    - path: /bin/bash
    - path: /usr/local/bin/opencode
  nvidia_web:
    name: nvidia_web
    endpoints:
    - host: nvidia.com
      port: 443
    - host: www.nvidia.com
      port: 443
    binaries:
    - path: /usr/bin/curl
