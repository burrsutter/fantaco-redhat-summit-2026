apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql-sales-order
  labels:
    app: postgresql-sales-order
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql-sales-order
  template:
    metadata:
      labels:
        app: postgresql-sales-order
    spec:
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel9/postgresql-15
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              protocol: TCP
              name: postgres-sord
          env:
            - name: POSTGRESQL_USER
              value: salesorder
            - name: POSTGRESQL_PASSWORD
              value: salesorder
            - name: POSTGRESQL_ADMIN_PASSWORD
              value: postgres
            - name: POSTGRESQL_DATABASE
              value: fantaco_sales_order
          volumeMounts:
            - name: postgres-sales-order-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-sales-order-data
          emptyDir: {}
