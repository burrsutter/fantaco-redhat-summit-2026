customer:
  enabled: true
  name: mcp-customer
  replicas: 1
  image:
    repository: docker.io/burrsutter/mcp-server-customer
    tag: 1.0.0
    pullPolicy: Always
  service:
    name: mcp-customer-service
    port: 9001
    targetPort: 9001
  route:
    enabled: true
    name: mcp-customer-route
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
  env:
    customerApiBaseUrl: http://fantaco-customer-service:8081
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 500m

