{{- if .Values.hrPolicy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.hrPolicy.name }}
  labels:
    app: {{ .Values.hrPolicy.name }}
spec:
  replicas: {{ .Values.hrPolicy.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.hrPolicy.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.hrPolicy.name }}
    spec:
      containers:
      - name: mcp-server
        image: {{ .Values.hrPolicy.image.repository }}:{{ .Values.hrPolicy.image.tag }}
        imagePullPolicy: {{ .Values.hrPolicy.image.pullPolicy }}
        env:
        - name: HR_POLICY_SEARCH_API_BASE_URL
          value: {{ .Values.hrPolicy.env.hrPolicySearchApiBaseUrl | quote }}
        ports:
        - containerPort: {{ .Values.hrPolicy.service.port }}
          name: http
          protocol: TCP
        resources:
          requests:
            memory: {{ .Values.hrPolicy.resources.requests.memory }}
            cpu: {{ .Values.hrPolicy.resources.requests.cpu }}
          limits:
            memory: {{ .Values.hrPolicy.resources.limits.memory }}
            cpu: {{ .Values.hrPolicy.resources.limits.cpu }}
{{- end }}
