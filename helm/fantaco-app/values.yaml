salesPolicySearch:
  enabled: true
  name: fantaco-sales-policy-search
  replicas: 1
  image:
    repository: docker.io/burrsutter/fantaco-sales-policy-search
    tag: 1.0.0
    pullPolicy: Always
  service:
    name: fantaco-sales-policy-search-service
    port: 8090
    targetPort: 8090
  route:
    enabled: true
    name: fantaco-sales-policy-search-route
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
  env:
    databaseUrl: "postgresql://rag_user:rag_pass@fantaco-sales-policy-search-db:5432/fantaco_sales_policy"
    llmApiBaseUrl: "https://litellm-prod.apps.maas.redhatworkshops.io"
    llmModelName: "qwen3-14b"
    embeddingModel: "nomic-ai/nomic-embed-text-v1.5"
    chunkSize: "1000"
    chunkOverlap: "200"
    collectionName: "sales_policy_docs"
    port: "8090"
    host: "0.0.0.0"
  secret:
    llmApiKey: "sk-placeholder-change-me"
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 2Gi
      cpu: 2000m
  livenessProbe:
    path: /health
    port: 8090
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    path: /health
    port: 8090
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

