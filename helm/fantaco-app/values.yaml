customer:
  enabled: true
  name: fantaco-customer-main
  replicas: 1
  image:
    repository: docker.io/burrsutter/fantaco-customer-main
    tag: 1.0.0
    pullPolicy: Always
  service:
    name: fantaco-customer-service
    port: 8081
    targetPort: 8081
  route:
    enabled: true
    name: fantaco-customer-service
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
  database:
    url: jdbc:postgresql://postgres-cust:5432/fantaco_customer
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddlAuto: update
    showSql: false
  logging:
    level: INFO
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m
  livenessProbe:
    path: /actuator/health/liveness
    port: 8081
    initialDelaySeconds: 90
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    path: /actuator/health/readiness
    port: 8081
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

