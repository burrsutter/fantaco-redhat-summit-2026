postgresql:
  customer:
    enabled: true
    name: postgresql-customer
    replicas: 1
    image:
      repository: registry.redhat.io/rhel9/postgresql-15
      pullPolicy: IfNotPresent
    service:
      name: postgres-cust
      port: 5432
    env:
      user: customer
      password: customer
      adminPassword: postgres
      database: fantaco_customer
    resources:
      requests:
        memory: 256Mi
        cpu: 250m
      limits:
        memory: 512Mi
        cpu: 500m
  product:
    enabled: true
    name: postgresql-product
    replicas: 1
    image:
      repository: registry.redhat.io/rhel9/postgresql-15
      pullPolicy: IfNotPresent
    service:
      name: postgres-prod
      port: 5432
    env:
      user: product
      password: product
      adminPassword: postgres
      database: fantaco_product
    resources:
      requests:
        memory: 256Mi
        cpu: 250m
      limits:
        memory: 512Mi
        cpu: 500m
  hr:
    enabled: true
    name: postgresql-hr-recruiting
    replicas: 1
    image:
      repository: registry.redhat.io/rhel9/postgresql-15
      pullPolicy: IfNotPresent
    service:
      name: postgres-hr
      port: 5432
    env:
      user: hr
      password: hr
      adminPassword: postgres
      database: fantaco_hr
    resources:
      requests:
        memory: 256Mi
        cpu: 250m
      limits:
        memory: 512Mi
        cpu: 500m
  salesorder:
    enabled: true
    name: postgresql-salesorder
    replicas: 1
    image:
      repository: registry.redhat.io/rhel9/postgresql-15
      pullPolicy: IfNotPresent
    service:
      name: postgres-so
      port: 5432
    env:
      user: salesorder
      password: salesorder
      adminPassword: postgres
      database: fantaco_sales_order
    resources:
      requests:
        memory: 256Mi
        cpu: 250m
      limits:
        memory: 512Mi
        cpu: 500m
  finance:
    enabled: true
    name: postgresql-finance
    replicas: 1
    image:
      repository: registry.redhat.io/rhel9/postgresql-15
      pullPolicy: IfNotPresent
    service:
      name: postgres-fin
      port: 5432
    env:
      user: finance
      password: finance
      adminPassword: postgres
      database: fantaco_finance
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
    resources:
      requests:
        memory: 256Mi
        cpu: 250m
      limits:
        memory: 512Mi
        cpu: 500m
