{{- if .Values.postgresql.hr.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.postgresql.hr.name }}
  labels:
    app: {{ .Values.postgresql.hr.name }}
spec:
  replicas: {{ .Values.postgresql.hr.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.postgresql.hr.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.postgresql.hr.name }}
    spec:
      containers:
        - name: postgresql
          image: {{ .Values.postgresql.hr.image.repository }}
          imagePullPolicy: {{ .Values.postgresql.hr.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.postgresql.hr.service.port }}
              protocol: TCP
              name: postgres-hr
          env:
            - name: POSTGRESQL_USER
              value: {{ .Values.postgresql.hr.env.user | quote }}
            - name: POSTGRESQL_PASSWORD
              value: {{ .Values.postgresql.hr.env.password | quote }}
            - name: POSTGRESQL_ADMIN_PASSWORD
              value: {{ .Values.postgresql.hr.env.adminPassword | quote }}
            - name: POSTGRESQL_DATABASE
              value: {{ .Values.postgresql.hr.env.database | quote }}
          volumeMounts:
            - name: postgres-hr-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: {{ .Values.postgresql.hr.resources.requests.memory }}
              cpu: {{ .Values.postgresql.hr.resources.requests.cpu }}
            limits:
              memory: {{ .Values.postgresql.hr.resources.limits.memory }}
              cpu: {{ .Values.postgresql.hr.resources.limits.cpu }}
      volumes:
        - name: postgres-hr-data
          emptyDir: {}
{{- end }}
